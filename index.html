<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FITSYNC BMI Calculator</title>

    <style>
        body{
            margin:0;
            padding:0;
            font-family:Arial;
            background:linear-gradient(to right,#0f172a,#1e293b);
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            color:white;
        }

        .container{
            width:450px;
            background:#111827;
            padding:30px;
            border-radius:20px;
            box-shadow:0 0 20px black;
        }

        h1{
            text-align:center;
            color:#38bdf8;
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:5px;
        }

        input,
        select{
            width:100%;
            padding:10px;
            border:none;
            border-radius:8px;
            font-size:16px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            background:#38bdf8;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
            font-weight:bold;
        }

        button:hover{
            background:#0ea5e9;
        }

        .result{
            margin-top:25px;
            background:#1e293b;
            padding:20px;
            border-radius:10px;
            display:none;
        }

        #status{
            font-size:20px;
            font-weight:bold;
            margin-top:10px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>FITSYNC</h1>
        <h2>BMI & Body Fat Percentage Calculator</h2>

        <div class="input-box">

            <label>Name</label>
            <input type="text" id="name" placeholder="Enter Name">

            <label>Age</label>
            <input type="number" id="age" placeholder="Enter Age">

            <label>Gender</label>
            <select id="gender">
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>

            <label>Weight (kg)</label>
            <input type="number" id="weight" placeholder="Enter Weight">

            <label>Height (cm)</label>
            <input type="number" id="height" placeholder="Enter Height">

            <button onclick="calculateBMI()">
                Calculate
            </button>

        </div>

        <div class="result" id="result">

            <h3>Your Health Report</h3>

            <p id="bmi"></p>
            <p id="fat"></p>
            <p id="status"></p>
            <p id="tips"></p>

        </div>

    </div>

    <script>
        function calculateBMI(){

            let name =
            document.getElementById("name").value;

            let age =
            parseInt(document.getElementById("age").value);

            let gender =
            document.getElementById("gender").value;

            let weight =
            parseFloat(document.getElementById("weight").value);

            let height =
            parseFloat(document.getElementById("height").value);

            if(name === "" || isNaN(age) || isNaN(weight) || isNaN(height)){
                alert("Please fill all fields");
                return;
            }

            let heightMeter =
            height / 100;

            let bmiValue =
            weight / (heightMeter * heightMeter);

            let bmi =
            bmiValue.toFixed(2);

            let bodyFat;

            if(gender === "male"){
                bodyFat =
                (1.20 * bmiValue) + (0.23 * age) - 16.2;
            }
            else{
                bodyFat =
                (1.20 * bmiValue) + (0.23 * age) - 5.4;
            }

            bodyFat =
            bodyFat.toFixed(2);

            let category = "";
            let tips = "";

            if(bmiValue < 18.5){

                category = "Underweight";

                tips =
                "Eat healthy foods, increase protein intake and do strength training.";
            }

            else if(bmiValue >= 18.5 && bmiValue < 24.9){

                category = "Normal Weight";

                tips =
                "Maintain a balanced diet and continue regular exercise.";
            }

            else if(bmiValue >= 25 && bmiValue < 29.9){

                category = "Overweight";

                tips =
                "Reduce junk food, increase physical activity and maintain diet control.";
            }

            else{

                category = "Obese";

                tips =
                "Follow a strict fitness plan and consult a health expert.";
            }

            document.getElementById("result").style.display =
            "block";

            document.getElementById("bmi").innerHTML =
            "BMI : " + bmi;

            document.getElementById("fat").innerHTML =
            "Body Fat Percentage : " + bodyFat + "%";

            document.getElementById("status").innerHTML =
            "Health Status : " + category;

            document.getElementById("tips").innerHTML =
            "Suggestions : " + tips;
        }
    </script>

</body>
</html>
